# 函数调用流程模板
name: function-flow
type: function
description: 函数调用流程模板，展示函数之间的调用关系

structure:
  components:
    - id: comp-001
      name: main()
      type: function
    - id: comp-002
      name: processData()
      type: function
    - id: comp-003
      name: validateInput()
      type: function
    - id: comp-004
      name: saveResult()
      type: function
  connections:
    - sourceId: comp-001
      targetId: comp-002
      type: call
    - sourceId: comp-002
      targetId: comp-003
      type: call
    - sourceId: comp-002
      targetId: comp-004
      type: call

placeholders:
  - name: function_names
    description: 函数名称列表
    default: []

