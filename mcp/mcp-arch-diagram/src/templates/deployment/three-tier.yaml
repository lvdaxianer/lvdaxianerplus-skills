# 三层架构模板
name: three-tier
type: deployment
description: 三层架构模板，包含表示层、业务逻辑层、数据访问层

structure:
  components:
    - id: comp-001
      name: Presentation Layer
      type: ui
    - id: comp-002
      name: Business Logic Layer
      type: service
    - id: comp-003
      name: Data Access Layer
      type: database
  connections:
    - sourceId: comp-001
      targetId: comp-002
      type: dataflow
    - sourceId: comp-002
      targetId: comp-003
      type: dataflow

placeholders:
  - name: presentation_name
    description: 表示层名称
    default: Web UI
  - name: business_name
    description: 业务逻辑层名称
    default: Business Service

